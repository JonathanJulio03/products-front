<main class="container">
  <header class="header">
    <h1>Manage Products</h1>
  </header>

  <app-product-form (productSubmitted)="handleCreateProduct($event)"></app-product-form>

  @if (productUseCase.error()) {
  <div class="alert alert-error">{{ productUseCase.error() }}</div>
  }

  @if (productUseCase.isLoading()) {
  <div class="loader">Loading data from the server...</div>
  }

  <div class="mat-elevation-z8 table-container" [class.hidden]="productUseCase.isLoading()">
    <table mat-table [dataSource]="productUseCase.products()">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> <strong>{{element.name}}</strong> </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef> Description </th>
        <td mat-cell *matCellDef="let element"> {{element.description}} </td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef> Price </th>
        <td mat-cell *matCellDef="let element"> ${{element.price | number:'1.2-2'}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">

          <button mat-icon-button color="primary" (click)="handleEditProduct(element.id)" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-icon-button color="warn" (click)="handleDeleteProduct(element.id)" title="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4" style="text-align: center; padding: 2rem;">
          No products available.
        </td>
      </tr>
    </table>

    <mat-paginator [length]="productUseCase.totalRecords()" [pageSize]="pageSize()" [pageIndex]="currentPage() - 1"
      [pageSizeOptions]="[5, 10, 25, 100]" (page)="onPageChange($event)" showFirstLastButtons aria-label="Select page">
    </mat-paginator>
  </div>
</main>
